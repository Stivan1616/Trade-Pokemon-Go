<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTS Pro - Pokémon GO Trade 2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-dark: #1e293b;
            --bg-card: #334155;
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --offer-color: #4ade80;
            --want-color: #f43f5e;
            --bg-hover: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent);
        }

        /* Controles y Buscador Mágico */
        .controls {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
        }

        .search-container {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        input,
        button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
            font-weight: bold;
        }

        input {
            width: 300px;
        }

        /* El Pop-up de Sugerencias */
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--bg-card);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            /* Oculto por defecto */
        }

        .suggestions-box::-webkit-scrollbar {
            width: 8px;
        }

        .suggestions-box::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #1e293b;
            transition: background 0.2s;
        }

        .suggestion-item:hover {
            background: var(--bg-hover);
        }

        .suggestion-item img {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }

        .suggestion-name {
            text-transform: capitalize;
            font-size: 0.9em;
        }

        button {
            cursor: pointer;
            transition: 0.2s;
            height: 39px;
        }

        .btn-offer {
            background: var(--offer-color);
            color: #000;
        }

        .btn-want {
            background: var(--want-color);
            color: #fff;
        }

        .btn-photo {
            background: var(--accent);
            color: #000;
            margin-left: auto;
        }

        button:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        /* Contenedores de Tradeo */
        .trade-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .column {
            background: #0f172a;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #334155;
        }

        .column.offer-col {
            border-top: 5px solid var(--offer-color);
        }

        .column.want-col {
            border-top: 5px solid var(--want-color);
        }

        .column h2 {
            text-align: center;
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        /* Tarjetas de Pokémon */
        .poke-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .poke-card img {
            width: 100px;
            height: 100px;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
        }

        .poke-card img:hover {
            transform: scale(1.1);
        }

        .poke-name {
            font-size: 0.9em;
            text-transform: capitalize;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }

        /* Controles de la tarjeta */
        .attributes {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin-bottom: 8px;
        }

        .attr-btn {
            font-size: 0.65em;
            padding: 2px 6px;
            border-radius: 10px;
            background: #475569;
            color: #ccc;
            cursor: pointer;
            user-select: none;
        }

        .attr-btn.active.purified {
            background: #e2e8f0;
            color: #000;
            border: 1px solid #38bdf8;
        }

        .attr-btn.active.legacy {
            background: #fbbf24;
            color: #000;
        }

        .attr-btn.active.specbg {
            background: #c084fc;
            color: #fff;
        }

        .attr-btn.active.xxl {
            background: #fb7185;
            color: #fff;
        }

        .attr-btn.active.special-icon {
            background: #10b981;
            color: #fff;
        }

        .inputs {
            display: flex;
            gap: 5px;
            width: 100%;
            justify-content: space-between;
        }

        .inputs input {
            width: 45%;
            padding: 4px;
            font-size: 0.7em;
            text-align: center;
            background: #1e293b;
            color: #fff;
            border: 1px solid #475569;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Modo Foto */
        #photo-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
        }

        #capture-area {
            background: #0f172a;
            padding: 30px;
            border-radius: 15px;
            width: 800px;
            max-width: 90vw;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        .download-btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.2em;
            background: var(--offer-color);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🚀 PoGo Trade Hub Pro 2.0</h1>

    <div class="controls">
        <div class="search-container">
            <input type="text" id="pokeInput" placeholder="Escribe el Pokémon..." autocomplete="off">
            <div id="suggestions" class="suggestions-box"></div>
        </div>
        <button class="btn-offer" onclick="addPokemon('offer')">➕ Añadir a Ofrezco</button>
        <button class="btn-want" onclick="addPokemon('want')">➕ Añadir a Busco</button>
        <button class="btn-photo" onclick="openPhotoMode()">📸 Modo Foto</button>
    </div>

    <div class="trade-board" id="main-board">
        <div class="column offer-col">
            <h2>🟩 Lo que ofrezco</h2>
            <div class="grid" id="grid-offer"></div>
        </div>
        <div class="column want-col">
            <h2>🟥 Lo que busco</h2>
            <div class="grid" id="grid-want"></div>
        </div>
    </div>

    <div id="photo-modal">
        <span class="close-btn" onclick="closePhotoMode()">&times;</span>
        <div id="capture-area"></div>
        <button class="download-btn" onclick="downloadImage()">💾 Descargar Imagen del Trade</button>
    </div>

    <script>
        // --- SISTEMA DE AUTOCOMPLETADO NINJA ---
        let masterPokemonList = [];
        const searchInput = document.getElementById('pokeInput');
        const suggestionsBox = document.getElementById('suggestions');

        // Al cargar la página, nos robamos (respetuosamente) la lista de +1300 Pokémon
        async function loadMasterList() {
            try {
                const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1500');
                const data = await res.json();
                masterPokemonList = data.results;
            } catch (e) {
                console.error("Falló la carga de la Pokédex maestra.", e);
            }
        }
        loadMasterList();

        // Escuchar cada tecla que presionas
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            suggestionsBox.innerHTML = ''; // Limpiar anteriores

            if (query.length < 2) {
                suggestionsBox.style.display = 'none';
                return;
            }

            // Filtrar y tomar solo los primeros 10 resultados para no saturar
            const matches = masterPokemonList.filter(p => p.name.includes(query)).slice(0, 10);

            if (matches.length > 0) {
                suggestionsBox.style.display = 'block';
                matches.forEach(poke => {
                    // Magia: Extraer el ID de la URL (ej: https://pokeapi.co/api/v2/pokemon/25/)
                    const pokeId = poke.url.split('/').filter(Boolean).pop();
                    const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokeId}.png`;

                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    item.innerHTML = `
                        <img src="${spriteUrl}" alt="${poke.name}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png'">
                        <span class="suggestion-name">${poke.name.replace(/-/g, ' ')}</span>
                    `;

                    // Al hacer click, auto-completar y cerrar
                    item.addEventListener('click', () => {
                        searchInput.value = poke.name;
                        suggestionsBox.style.display = 'none';
                    });

                    suggestionsBox.appendChild(item);
                });
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        // Ocultar sugerencias si haces click fuera
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });

        // --- LÓGICA DE TRADEO ---
        async function fetchPokemon(name) {
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name.toLowerCase().trim()}`);
                if (!res.ok) throw new Error('No encontrado');
                return await res.json();
            } catch (e) {
                alert('Ese Pokémon no existe o está mal escrito. ¡Usa las sugerencias!');
                return null;
            }
        }

        async function addPokemon(type) {
            const pokeName = searchInput.value;
            if (!pokeName) return;

            // Bloquear botón temporalmente para evitar spam
            const data = await fetchPokemon(pokeName);
            if (!data) return;

            const grid = document.getElementById(`grid-${type}`);
            const card = document.createElement('div');
            card.className = 'poke-card';

            const spriteNormal = data.sprites.other['official-artwork'].front_default || data.sprites.front_default;
            const spriteShiny = data.sprites.other['official-artwork'].front_shiny || data.sprites.front_shiny;

            card.innerHTML = `
                <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
                <div class="poke-name-container" style="display: flex; align-items: center; justify-content: center; gap: 5px;">
                    <div class="poke-name">${data.name.replace(/-/g, ' ')}</div>

                         class="main-img"

                         data-shiny="${spriteShiny}" 
                         onclick="toggleShiny(this)" 
                         title="Click para versión Shiny">
                </div>
                
                <div class="attributes">
                    <div class="attr-btn purified" onclick="this.classList.toggle('active')">Purified</div>

        function toggleShiny(imgElement) {
            const isShiny = imgElement.src === imgElement.dataset.shiny;
            imgElement.src = isShiny ? imgElement.dataset.normal : imgElement.dataset.shiny;

            const card = imgElement.closest('.poke-card');
            const gigamaxBtn = card.querySelector('.attr-btn.special-icon');
            const shinyIcon = card.querySelector('.shiny-icon');

            // Toggle shiny icon visibility
            if (!isShiny) {
                shinyIcon.style.display = 'block';
            } else {
                shinyIcon.style.display = 'none';
            }

            // Si el modo Gigamax está activo, no sobreescribir el filtro rojo
            if (gigamaxBtn && gigamaxBtn.classList.contains('active')) {
                return;
            }

            if (!isShiny) {
                imgElement.style.filter = 'drop-shadow(0 0 10px #fde047)';
            } else {
                imgElement.style.filter = 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))';
            }
        }

        function toggleOverlay(btn) {
            btn.classList.toggle('active');
            const card = btn.closest('.poke-card');
            const overlay = card.querySelector('.overlay-img');
            const mainImg = card.querySelector('.main-img');

            if (btn.classList.contains('active')) {
                overlay.style.display = 'block';
                // Añadir filtro rojizo al Pokémon (saturación y tinte rojo, más brillo)
                mainImg.style.filter = 'drop-shadow(0 0 15px rgba(255, 0, 0, 0.8)) sepia(0.5) hue-rotate(320deg) saturate(200%)';
            } else {
                overlay.style.display = 'none';
                // Restaurar el filtro según si es shiny o no
                const isShiny = mainImg.src === mainImg.dataset.shiny;
                // Si la imagen actual es la versión shiny (es decir, NO es la normal)
                if (mainImg.src !== mainImg.dataset.normal) {
                    mainImg.style.filter = 'drop-shadow(0 0 10px #fde047)';
                } else {
                    mainImg.style.filter = 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))';
                }
            }
        }

        function openPhotoMode() {
            const modal = document.getElementById('photo-modal');
            const captureArea = document.getElementById('capture-area');
            const mainBoard = document.getElementById('main-board');

            captureArea.innerHTML = '';
            const clone = mainBoard.cloneNode(true);

            clone.querySelectorAll('.delete-btn').forEach(btn => btn.remove());

            clone.querySelectorAll('.poke-card').forEach(card => {
                card.querySelectorAll('.attr-btn').forEach(btn => {
                    if (!btn.classList.contains('active')) btn.style.display = 'none';
                });

                const lvl = card.querySelector('.lvl-input').value;
                const year = card.querySelector('.year-input').value;
                const inputsDiv = card.querySelector('.inputs');

                inputsDiv.innerHTML = `
                    <span style="font-size: 0.8em; color: #94a3b8; font-weight: bold;">${lvl ? 'Nv.' + lvl : ''}</span>
                    <span style="font-size: 0.8em; color: #94a3b8; font-weight: bold;">${year ? year : ''}</span>
                `;
            });

            captureArea.appendChild(clone);
            modal.style.display = 'flex';
        }

        function closePhotoMode() {
            document.getElementById('photo-modal').style.display = 'none';
        }

        function downloadImage() {
            const captureArea = document.getElementById('capture-area');

            html2canvas(captureArea, {
                backgroundColor: '#1e293b',
                scale: 2,
                useCORS: true // Vital para que no haya problemas renderizando imágenes externas (PokeAPI)
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Mi_Tradeo_Epico.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(error => {
                console.error("Error al generar la imagen:", error);
                alert("Ocurrió un error al descargar la imagen. Intenta recargar la página: " + error.message);
            });
        }
    </script>
